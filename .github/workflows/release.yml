name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
          - os: ubuntu-latest
            label: linux
          - os: macos-latest
            label: macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libglib2.0-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev
      - run: bun install --frozen-lockfile
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Alarm App ${{ github.ref_name }}"
          releaseBody: |
            See [CHANGELOG](https://github.com/alimtvnetwork/alarm-app/blob/main/CHANGELOG.md)
          releaseDraft: false
          prerelease: false

  checksums:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > checksums.txt
          cat checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/checksums.txt

  install-scripts:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate versioned install scripts
        run: |
          VERSION="${GITHUB_REF_NAME}"
          sed "s/{{VERSION}}/$VERSION/g" scripts/install.ps1.tmpl > install.ps1
          sed "s/{{VERSION}}/$VERSION/g" scripts/install.sh.tmpl > install.sh
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            install.ps1
            install.sh
